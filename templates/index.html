<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wine Quality Predictor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a0000, #4a0010);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.95);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        h1 { text-align: center; color: #6b0020; margin-bottom: 8px; font-size: 2rem; }
        .subtitle { text-align: center; color: #888; margin-bottom: 30px; font-size: 0.95rem; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .form-group { display: flex; flex-direction: column; }
        label { font-size: 0.85rem; font-weight: 600; color: #444; margin-bottom: 5px; }
        input {
            padding: 10px 14px;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: border 0.2s;
        }
        input:focus { outline: none; border-color: #6b0020; }
        button {
            margin-top: 24px;
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6b0020, #a00030);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.88; }
        .result {
            margin-top: 24px;
            padding: 18px;
            background: linear-gradient(135deg, #fff0f3, #ffe0e8);
            border-left: 5px solid #6b0020;
            border-radius: 10px;
            text-align: center;
        }
        .result h2 { color: #6b0020; font-size: 1.4rem; }
        .result p { color: #555; margin-top: 6px; font-size: 0.95rem; }
    </style>
</head>
<body>
<div class="container">
    <h1>🍷 Wine Quality Predictor</h1>
    <p class="subtitle">Enter the chemical properties to predict wine quality (scale 0–10)</p>

    <form method="POST" action="/predict">
        <div class="grid">
            <div class="form-group">
                <label>Fixed Acidity</label>
                <input type="number" step="0.01" name="fixed_acidity" placeholder="e.g. 7.4" required>
            </div>
            <div class="form-group">
                <label>Volatile Acidity</label>
                <input type="number" step="0.01" name="volatile_acidity" placeholder="e.g. 0.70" required>
            </div>
            <div class="form-group">
                <label>Citric Acid</label>
                <input type="number" step="0.01" name="citric_acid" placeholder="e.g. 0.00" required>
            </div>
            <div class="form-group">
                <label>Residual Sugar</label>
                <input type="number" step="0.01" name="residual_sugar" placeholder="e.g. 1.9" required>
            </div>
            <div class="form-group">
                <label>Chlorides</label>
                <input type="number" step="0.001" name="chlorides" placeholder="e.g. 0.076" required>
            </div>
            <div class="form-group">
                <label>Free Sulfur Dioxide</label>
                <input type="number" step="0.1" name="free_sulfur_dioxide" placeholder="e.g. 11.0" required>
            </div>
            <div class="form-group">
                <label>Total Sulfur Dioxide</label>
                <input type="number" step="0.1" name="total_sulfur_dioxide" placeholder="e.g. 34.0" required>
            </div>
            <div class="form-group">
                <label>Density</label>
                <input type="number" step="0.0001" name="density" placeholder="e.g. 0.9978" required>
            </div>
            <div class="form-group">
                <label>pH</label>
                <input type="number" step="0.01" name="pH" placeholder="e.g. 3.51" required>
            </div>
            <div class="form-group">
                <label>Sulphates</label>
                <input type="number" step="0.01" name="sulphates" placeholder="e.g. 0.56" required>
            </div>
            <div class="form-group">
                <label>Alcohol (%)</label>
                <input type="number" step="0.1" name="alcohol" placeholder="e.g. 9.4" required>
            </div>
        </div>
        <button type="submit">Predict Quality 🍷</button>
    </form>

    {% if prediction %}
    <div class="result">
        <h2>Predicted Quality: {{ prediction }}</h2>
        <p>Score is on a scale of 0 (very bad) to 10 (excellent)</p>
    </div>
    {% endif %}
</div>
</body>
</html>
